<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive Java + Spring Boot Interview Handbook">
  <title>Java & Spring Boot Interview Handbook</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app">

  <!-- ── Top bar ─────────────────────────────────────────── -->
  <header id="topbar" role="banner">
    <button id="hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="sidebar">
      ☰
    </button>
    <div class="logo">☕ Java &amp; <span>Spring Boot</span> Handbook</div>
    <button id="theme-toggle" aria-label="Toggle dark/light theme">🌙 Dark</button>
  </header>

  <!-- Mobile overlay -->
  <div id="overlay" aria-hidden="true"></div>

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <nav id="sidebar" aria-label="Category navigation">
    <div id="sidebar-header">
      <h3>Categories</h3>
    </div>
    <ul id="nav-list" role="list"></ul>
  </nav>

  <!-- ── Main content ────────────────────────────────────── -->
  <main id="main" role="main">

    <!-- Controls (sticky) -->
    <div id="controls" role="search">

      <!-- Search -->
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input
          id="search-input"
          type="search"
          placeholder="Search questions, tags…"
          aria-label="Search questions"
          autocomplete="off"
          spellcheck="false"
        >
        <button id="search-clear" aria-label="Clear search">✕</button>
      </div>

      <!-- Difficulty filter -->
      <div class="difficulty-filter" role="group" aria-label="Filter by difficulty">
        <button class="diff-pill active" data-difficulty="all"    aria-pressed="true">All</button>
        <button class="diff-pill"        data-difficulty="easy"   aria-pressed="false">Easy</button>
        <button class="diff-pill"        data-difficulty="medium" aria-pressed="false">Medium</button>
        <button class="diff-pill"        data-difficulty="hard"   aria-pressed="false">Hard</button>
      </div>

      <!-- Expand / Collapse -->
      <div class="action-btns">
        <button class="btn-sm" id="expand-all"   aria-label="Expand all questions">▼ Expand All</button>
        <button class="btn-sm" id="collapse-all" aria-label="Collapse all questions">▲ Collapse All</button>
      </div>

    </div><!-- /controls -->

    <!-- Progress bar -->
    <div id="progress-area" aria-live="polite" aria-label="Review progress">
      <div class="progress-header">
        <span id="progress-count">0 / 0 reviewed</span>
        <span id="progress-text">0%</span>
      </div>
      <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Review progress">
        <div id="progress-bar"></div>
      </div>
    </div>

    <!-- Question cards -->
    <div id="content">
      <div id="result-meta" aria-live="polite">
        <span id="result-count"></span>
      </div>
      <div id="questions-container" aria-label="Questions list"></div>
    </div>

  </main>

</div><!-- /app -->

<!-- Scripts — order matters: data → search helpers → app -->
<script src="js/data.js"></script>
<script src="js/search.js"></script>
<script src="js/app.js"></script>

</body>
</html>
